name: Obfuscation Rules Check
on:
  pull_request:
    paths:
      - 'GrowingAnalytics/src/main/ets/**/*.ets'
      - 'GrowingToolsKit/src/main/ets/**/*.ets'
      - 'GrowingAnalyticsAtomicService/src/main/ets/**/*.ets'
      - '**/*.proto'
      - '**/obfuscation-rules.txt'
      - '**/consumer-rules.txt'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 scripts/check_obfuscation_rules.py --base origin/${{ github.base_ref }} --strict
